spring.application.name=AI-Care-Report-BE

# DB connection (Supabase Transaction Pooler - 6543 port)
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.dyencnkliuyaoztvqgxo
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA settings (ddl-auto=update: 테이블 없으면 자동 생성, 기존 데이터 유지)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.database-platform 은 Hibernate 7부터 자동 감지되므로 불필요

# JWT (운영 환경에서는 반드시 환경변수 JWT_SECRET 으로 교체할 것)
jwt.secret=${JWT_SECRET:careReportSecretKeyForDevelopmentOnlyPleaseChangeInProduction2024}
jwt.expiration=86400000

# Multipart (오디오/이미지 업로드)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# 업로드 파일 저장 경로
app.upload.dir=${UPLOAD_DIR:uploads}

logging.level.org.springframework.jdbc.core=DEBUG

# Dev seed data (test account)
app.seed.enabled=true
app.seed.user-email=test@test.com
app.seed.user-password=test123!
